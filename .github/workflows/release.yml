name: Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          DATE=$(date -u +'%Y.%m.%d')
          SHA=${GITHUB_SHA::7}
          echo "version=${DATE}-${SHA}" >> $GITHUB_OUTPUT
          echo "tag=v${DATE}-${SHA}" >> $GITHUB_OUTPUT

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: dist:win
          - os: macos-latest
            cmd: dist:mac
          - os: ubuntu-latest
            cmd: dist:linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set version in package.json
        shell: bash
        run: |
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version --allow-same-version

      - run: npm ci

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/AppData/Local/electron/Cache
            ~/Library/Caches/electron
          key: electron-31.7.7-${{ matrix.os }}

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron-builder
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron-builder
          key: electron-builder-${{ matrix.os }}

      - name: Build (with retry)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3"
            if npm run ${{ matrix.cmd }}; then
              echo "Build succeeded on attempt $i"
              exit 0
            fi
            echo "Build failed on attempt $i, retrying in 10s..."
            sleep 10
          done
          echo "All 3 attempts failed"
          exit 1

      - name: List dist
        shell: bash
        run: ls -la dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.version.outputs.tag }}';
            const sha = '${{ github.sha }}';
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: sha,
              });
              core.info(`Created tag ${tag}`);
            } catch (e) {
              if (e.status === 422) core.info(`Tag ${tag} already exists`);
              else throw e;
            }

      - name: Create release with uploads
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
