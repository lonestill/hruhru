name: Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # Compute a version string like v2026.07.13-abc1234 once and share it
  # with the platform build jobs so every artifact uses the same tag.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          DATE=$(date -u +'%Y.%m.%d')
          SHA=${GITHUB_SHA::7}
          echo "version=${DATE}-${SHA}" >> $GITHUB_OUTPUT
          echo "tag=v${DATE}-${SHA}" >> $GITHUB_OUTPUT

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: dist:win
            artifact: HH Job Tool-*windows-x64*
          - os: macos-latest
            cmd: dist:mac
            artifact: HH Job Tool-*macos-*
          - os: ubuntu-latest
            cmd: dist:linux
            artifact: HH Job Tool-*linux-*

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set version in package.json
        shell: bash
        run: |
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version --allow-same-version

      - run: npm ci

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.version.outputs.tag }}';
            const sha = '${{ github.sha }}';
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: sha,
              });
              core.info(`Created tag ${tag}`);
            } catch (e) {
              if (e.status === 422) core.info(`Tag ${tag} already exists`);
              else throw e;
            }

      - name: Create release with uploads
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
